backend:
  name: github
  repo: hirokii/cloudcost-website
  branch: main

media_folder: "blog/images"
public_folder: "/blog/images"

collections:
  - name: "posts"
    label: "ブログ記事"
    label_singular: "記事"
    folder: "blog/_posts"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"

    fields:

      - label: "タイトル"
        name: "title"
        widget: "string"
        hint: "記事タイトル（日本語OK）"

      - label: "スラッグ（URL）"
        name: "slug"
        widget: "string"
        hint: "半角英数字とハイフンのみ。例：aws-cost-reduction-guide"
        pattern: ['^[a-z0-9-]+$', "半角英数字とハイフンのみ使用してください"]

      - label: "公開日"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "カテゴリ"
        name: "category"
        widget: "select"
        options:
          - { label: "AWS", value: "aws" }
          - { label: "Google Cloud (GCP)", value: "gcp" }
          - { label: "コスト削減", value: "cost" }
          - { label: "導入事例", value: "case" }
          - { label: "お知らせ", value: "news" }

      - label: "著者"
        name: "author"
        widget: "string"
        default: "工藤 弥主子"

      - label: "読了時間（分）"
        name: "read_time"
        widget: "number"
        default: 5
        min: 1
        max: 60

      - label: "メタディスクリプション（SEO用・120〜155文字）"
        name: "description"
        widget: "text"
        hint: "検索結果に表示される説明文。120〜155文字が最適です。"

      - label: "一覧ページ用の概要（2文程度）"
        name: "excerpt"
        widget: "text"
        hint: "ブログ一覧ページのカードに表示される短い説明文。"

      - label: "イントロ（冒頭の1段落）"
        name: "intro"
        widget: "text"
        hint: "記事の冒頭に来る段落。結論から書くと効果的です。"

      - label: "ポイント（info-boxに表示）"
        name: "key_takeaway"
        widget: "text"
        hint: "記事の要点を1〜2文でまとめてください。"

      - label: "本文"
        name: "body"
        widget: "markdown"
        hint: "本文をMarkdownで記述してください。## でH2見出しになります。"

      - label: "まとめ（箇条書き）"
        name: "summary_points"
        widget: "list"
        label_singular: "まとめポイント"
        hint: "まとめセクションの箇条書き。3〜5項目が理想的です。"
        field:
          label: "ポイント"
          name: "point"
          widget: "string"

      - label: "FAQ（SEO・AI検索用・必須）"
        name: "faq"
        widget: "list"
        label_singular: "FAQ項目"
        hint: "3〜5個のQ&Aを追加してください。"
        min: 3
        max: 5
        fields:
          - label: "質問"
            name: "question"
            widget: "string"
          - label: "回答"
            name: "answer"
            widget: "text"
